<mat-toolbar color="primary" class="main-header pixel-border-bottom">
    <div class="header-container">
        <div class="left-section">
            <span class="brand" (click)="goToGameList()">GAME TRACKER</span>
        </div>

        <span class="spacer"></span>

        <div class="right-section">
            <nav class="nav-links">
                <button mat-button class="retro-btn" (click)="goToGameList()">BROWSE</button>
                <button mat-button class="retro-btn" (click)="goToUserPage()" [disabled]="!user()">
                    MY GUIDES
                </button>
            </nav>

            <div class="auth-section">
                @if (user()) {
                <div class="profile-trigger" [matMenuTriggerFor]="profileMenu">
                    <span class="username">{{ user()?.name }}</span>
                    <div class="avatar-wrapper">
                        @if (user()?.profilePic) {
                        <img [src]="user()?.profilePic" alt="Profile" />
                        } @else {
                        <mat-icon fontIcon="account_circle"></mat-icon>
                        }
                    </div>
                </div>

                <mat-menu #profileMenu="matMenu" class="retro-menu">
                    <div class="menu-header">
                        <p class="menu-name">{{ user()?.name }}</p>
                        <p class="menu-email">{{ user()?.email || 'PLAYER_ONE' }}</p>
                    </div>
                    <mat-divider></mat-divider>
                    <button mat-menu-item (click)="goToUserPage()" class="retro-menu-btn">
                        <mat-icon fontIcon="person"></mat-icon>
                        <span>PROFILE</span>
                    </button>
                    <button mat-menu-item (click)="logout()" class="retro-menu-btn">
                        <mat-icon fontIcon="logout"></mat-icon>
                        <span>LOGOUT</span>
                    </button>
                </mat-menu>
                } @else {
                <button mat-flat-button color="accent" class="retro-btn" (click)="goToLogin()">
                    LOGIN
                </button>
                }
            </div>
        </div>
    </div>
</mat-toolbar>

<main class="content">
    <router-outlet />
</main>
