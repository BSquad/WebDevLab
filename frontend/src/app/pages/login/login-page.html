<div class="page flex-center">
    <mat-card class="login-container">
        <mat-card-header>
            <mat-card-title>
                <h1>Login</h1>
            </mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" class="login-form">
                <mat-form-field appearance="outline" color="accent" class="full-width">
                    <mat-label>Username</mat-label>
                    <input
                        matInput
                        type="text"
                        id="username"
                        name="username"
                        [(ngModel)]="username"
                        required
                    />
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input
                        matInput
                        type="password"
                        id="password"
                        name="password"
                        [(ngModel)]="password"
                        required
                    />
                </mat-form-field>

                <button
                    mat-flat-button
                    type="submit"
                    [disabled]="!loginForm.valid"
                    class="full-width normal-button"
                >
                    Login
                </button>
            </form>

            <p class="link text-center">
                Don't have an account?
                <a routerLink="/register">Register now</a>
            </p>
        </mat-card-content>
    </mat-card>
</div>
