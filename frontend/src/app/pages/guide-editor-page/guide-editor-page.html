<div class="page">
    <div class="page-header">
        <button class="back-button" (click)="goBack()">← Back</button>

        <h1 class="page-title">
            {{ isEditMode ? 'Edit Guide' : 'Create Guide for ' + (game()?.title || '') }}
        </h1>
    </div>

    <div class="page-content">
        <div class="page-card">
            <form #guideCreationForm="ngForm" (ngSubmit)="onSubmit(guideCreationForm)">
                <div class="form-group">
                    <label for="title">Title</label>

                    <input
                        type="text"
                        id="title"
                        name="title"
                        [(ngModel)]="guide.title"
                        required
                        placeholder="Enter guide title..."
                    />
                </div>

                <div class="form-group">
                    <label for="content">Content</label>

                    <textarea
                        id="content"
                        name="content"
                        [(ngModel)]="guide.content"
                        required
                        placeholder="Write your guide here... (You can reference screenshots like 'see picture 1')"
                    ></textarea>
                </div>

                <div class="form-group upload-container">
                    <label>Screenshots</label>

                    <input
                        #fileInput
                        type="file"
                        id="screenshots"
                        (change)="onFileSelected($event)"
                        multiple
                        accept="image/*"
                        hidden
                    />

                    <button type="button" class="upload-button" (click)="fileInput.click()">
                        Select Screenshots
                    </button>

                    @if (previewUrls.length > 0) {

                    <div class="preview-container">
                        @for (url of previewUrls; track $index; let i = $index) {

                        <div class="preview-wrapper">
                            <img [src]="url" class="preview-image" (click)="openImage(url)" />

                            <div class="screenshot-label">Picture {{ i + 1 }}</div>

                            <button
                                type="button"
                                class="remove-preview"
                                (click)="removeScreenshot(i)"
                            >
                                ✕
                            </button>
                        </div>

                        }
                    </div>

                    }
                </div>

                <div class="button-row">
                    <button class="submit-button" type="submit">
                        {{ isEditMode ? 'Update Guide' : 'Create Guide' }}
                    </button>

                    @if (isEditMode) {

                    <button class="delete-button" type="button" (click)="deleteGuide()">
                        Delete Guide
                    </button>

                    }
                </div>
            </form>
        </div>
    </div>
</div>

@if (activeImage()) {

<div class="image-overlay" (click)="closeImage()">
    <div class="image-modal" (click)="$event.stopPropagation()">
        <button class="close-image" (click)="closeImage()">✕</button>

        <img [src]="activeImage()" class="modal-image" />
    </div>
</div>

}
