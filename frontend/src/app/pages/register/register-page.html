<div class="page flex-center">
    <mat-card class="register-container">
        <mat-card-header>
            <mat-card-title>
                <h1>Register</h1>
            </mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form #registerForm="ngForm" (ngSubmit)="onSubmit(registerForm)" class="register-form">
                <mat-form-field appearance="outline" class="full-width white-field">
                    <mat-label>Username</mat-label>
                    <input
                        matInput
                        type="text"
                        id="username"
                        name="username"
                        [(ngModel)]="username"
                        required
                    />
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input
                        matInput
                        type="email"
                        id="email"
                        name="email"
                        [(ngModel)]="email"
                        required
                    />
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input
                        matInput
                        type="password"
                        id="password"
                        name="password"
                        [(ngModel)]="password"
                        required
                    />
                </mat-form-field>

                <button
                    mat-flat-button
                    type="submit"
                    [disabled]="!registerForm.valid"
                    class="full-width normal-button"
                >
                    Register
                </button>
            </form>

            <p class="link text-center">
                Already have an account?
                <a routerLink="/login">Login here</a>
            </p>
        </mat-card-content>
    </mat-card>
</div>
